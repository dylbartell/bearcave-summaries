<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowork Projects</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f5f5f5; color: #222; margin: 0; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 1rem; }

  .tabs { display: flex; gap: 0; border-bottom: 2px solid #ddd; margin-bottom: 1rem;
           position: sticky; top: 0; background: #f5f5f5; padding-top: 1rem; z-index: 10;
           flex-wrap: wrap; align-items: center; }
  .jackpot { margin-left: auto; font-size: .75rem; color: #dc2626; font-weight: 600; padding: 0 .5rem;
              white-space: nowrap; text-decoration: none; }
  .jackpot:hover { color: #ef4444; }
  .tab { padding: .6rem 1.25rem; cursor: pointer; border: none; background: none;
          font-size: .95rem; font-weight: 500; color: #666; border-bottom: 2px solid transparent;
          margin-bottom: -2px; transition: color .15s, border-color .15s; }
  .tab:hover { color: #333; }
  .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .summary { background: #fff; border-radius: 10px; padding: 1.5rem 1.75rem 1.25rem;
              margin-bottom: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .summary .header { text-align: center; margin-bottom: 1.25rem; padding-bottom: 1rem;
                      border-bottom: 1px solid #eee; }
  .summary .header .channel { font-size: .75rem; font-weight: 600; text-transform: uppercase;
                               letter-spacing: .06em; color: #6b7280; margin-bottom: .25rem; }
  .summary .header .datetime { font-size: 1.1rem; font-weight: 600; color: #1a1a1a; }
  .summary h2 { font-size: 1.05rem; margin: 1.25rem 0 .5rem; color: #1a1a1a; }
  .summary h3 { font-size: .95rem; margin: 1rem 0 .4rem; color: #374151; }
  .summary p { margin: .5rem 0; line-height: 1.6; }
  .summary ul { margin: .4rem 0 .4rem 1.25rem; }
  .summary li { margin: .3rem 0; line-height: 1.55; }
  .summary strong { color: #1a1a1a; }
  .summary hr { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }
  .summary a { color: #2563eb; text-decoration: none; }
  .summary a:hover { text-decoration: underline; }
  .summary .section-label { font-size: 1rem; font-weight: 700; margin: 1.5rem 0 .5rem; padding-top: .75rem;
                             border-top: 1px solid #eee; color: #1a1a1a; }
  .empty { text-align: center; padding: 3rem; color: #888; }

  /* ── DoC Digest styles ── */
  .doc-digest { background: #fff; border-radius: 10px; padding: 1.5rem 1.75rem 1.25rem;
                 margin-bottom: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .doc-header { text-align: center; margin-bottom: 1.25rem; padding-bottom: 1rem;
                 border-bottom: 1px solid #eee; }
  .doc-header .doc-channel { font-size: .7rem; font-weight: 700; text-transform: uppercase;
                              letter-spacing: .08em; color: #16a34a; margin-bottom: .25rem; }
  .doc-header .doc-date { font-size: 1.15rem; font-weight: 600; color: #1a1a1a; }
  .doc-header .doc-meta { font-size: .8rem; color: #6b7280; margin-top: .35rem; }
  .doc-deal-header { display: flex; align-items: center; gap: .6rem; margin: 1.5rem 0 .75rem;
                      padding: .6rem .8rem; background: #f0fdf4; border-radius: 8px;
                      border-left: 3px solid #16a34a; }
  .doc-deal-num { font-size: .75rem; font-weight: 700; color: #16a34a; min-width: 1.5rem; }
  .doc-deal-title { font-size: 1rem; font-weight: 600; color: #1a1a1a; flex: 1; }
  .doc-deal-score { font-size: .75rem; font-weight: 700; padding: .2rem .5rem;
                     border-radius: 12px; white-space: nowrap; }
  .score-high { background: #dcfce7; color: #15803d; }
  .score-mid { background: #fef9c3; color: #a16207; }
  .score-low { background: #fee2e2; color: #dc2626; }
  .doc-meta-table { width: 100%; border-collapse: collapse; margin: .5rem 0; font-size: .85rem; }
  .doc-meta-table td { padding: .3rem .5rem; border: none; vertical-align: top; }
  .doc-meta-table td:first-child { width: 110px; color: #6b7280; font-weight: 500; white-space: nowrap; }
  .doc-meta-table td:last-child { color: #1a1a1a; }
  .doc-meta-table tr:nth-child(even) { background: #fafafa; }
  .doc-warning { margin: .75rem 0; padding: .6rem .8rem; background: #fffbeb; border-left: 3px solid #f59e0b;
                  border-radius: 0 6px 6px 0; font-size: .85rem; color: #92400e; }
  .doc-warning p { margin: 0; }
  .doc-section-divider { font-size: .85rem; font-weight: 700; text-transform: uppercase;
                          letter-spacing: .04em; color: #6b7280; margin: 1.5rem 0 .5rem;
                          padding-top: .75rem; border-top: 1px solid #eee; }
  .doc-notes-header { color: #9ca3af; }
  .doc-cta { margin: .75rem 0; }
  .doc-cta-link { display: inline-block; padding: .4rem .8rem; background: #16a34a; color: #fff !important;
                   border-radius: 6px; font-size: .82rem; font-weight: 600; text-decoration: none !important;
                   transition: background .15s; }
  .doc-cta-link:hover { background: #15803d; }
  .doc-digest p { margin: .5rem 0; line-height: 1.6; font-size: .9rem; }
  .doc-digest ul { margin: .4rem 0 .4rem 1.25rem; }
  .doc-digest li { margin: .3rem 0; line-height: 1.55; font-size: .88rem; }
  .doc-digest hr { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }
  .doc-digest a { color: #16a34a; text-decoration: none; }
  .doc-digest a:hover { text-decoration: underline; }

  .single-content { background: #fff; border-radius: 8px; padding: 1.25rem 1.5rem;
             box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .single-content h1 { font-size: 1.3rem; margin-bottom: .5rem; }
  .single-content h2 { font-size: 1.1rem; margin: 1.5rem 0 .5rem; padding-top: .75rem;
                border-top: 1px solid #eee; color: #1a1a1a; }
  .single-content h3 { font-size: 1rem; margin: 1rem 0 .3rem; color: #2563eb; }
  .single-content p { margin: .4rem 0; line-height: 1.6; }
  .single-content ul, .single-content ol { margin: .3rem 0 .3rem 1.25rem; }
  .single-content li { margin: .2rem 0; line-height: 1.5; }
  .single-content hr { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
  .single-content table { width: 100%; border-collapse: collapse; margin: .75rem 0; font-size: .85rem;
                   display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .single-content th { background: #f0f4ff; padding: .5rem .6rem; text-align: left; font-weight: 600;
                border-bottom: 2px solid #c7d2fe; white-space: nowrap; position: sticky; top: 0; }
  .single-content td { padding: .45rem .6rem; border-bottom: 1px solid #eee; vertical-align: top; }
  .single-content tr:hover td { background: #f8faff; }

  .rating-high { color: #16a34a; font-weight: 700; }
  .rating-mid { color: #ca8a04; font-weight: 600; }
  .rating-low { color: #dc2626; font-weight: 600; }

  /* ── Claims table ── */
  .claims-toolbar { display: flex; gap: .5rem; margin-bottom: .75rem; flex-wrap: wrap; align-items: center; }
  .claims-toolbar input { flex: 1; min-width: 150px; padding: .4rem .6rem; border: 1px solid #ddd;
                           border-radius: 6px; font-size: .85rem; }
  .claims-toolbar select { padding: .4rem .5rem; border: 1px solid #ddd; border-radius: 6px;
                            font-size: .8rem; background: #fff; }
  .claims-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .claims-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .claims-table th { background: #f0f4ff; padding: .5rem .6rem; text-align: left; font-weight: 600;
                      border-bottom: 2px solid #c7d2fe; white-space: nowrap; cursor: pointer;
                      user-select: none; position: relative; }
  .claims-table th:hover { background: #e0eaff; }
  .claims-table th .sort-arrow { font-size: .65rem; margin-left: .25rem; color: #999; }
  .claims-table th .sort-arrow.active { color: #2563eb; }
  .claims-table td { padding: .45rem .6rem; border-bottom: 1px solid #eee; vertical-align: top;
                      max-width: 250px; }
  .claims-table tr:hover td { background: #f8faff; }
  .claims-table a { color: #2563eb; text-decoration: none; font-weight: 500; }
  .claims-table a:hover { text-decoration: underline; }
  .claim-action { font-size: .78rem; color: #555; line-height: 1.4; }
  .claim-notes { font-size: .75rem; color: #b45309; font-weight: 500; }
  .status-new { color: #2563eb; font-weight: 600; }
  .status-filed { color: #16a34a; font-weight: 600; }
  .status-review { color: #ca8a04; font-weight: 600; }
  .deadline-urgent { color: #dc2626; font-weight: 600; }
  .deadline-soon { color: #ca8a04; font-weight: 500; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #ddd; }
    .tabs { background: #1a1a1a; border-bottom-color: #333; }
    .tab { color: #888; }
    .tab:hover { color: #ccc; }
    .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .jackpot { color: #f87171; }
    .jackpot:hover { color: #fca5a5; }
    .summary, .single-content { background: #252525; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
    .summary .header { border-bottom-color: #333; }
    .summary .header .channel { color: #9ca3af; }
    .summary .header .datetime { color: #eee; }
    .summary h2, .summary strong, .single-content h1, .single-content h2 { color: #eee; }
    .summary h3 { color: #d1d5db; }
    .summary hr { border-top-color: #333; }
    .summary a { color: #60a5fa; }
    .summary .section-label { color: #eee; border-top-color: #333; }
    .single-content h3 { color: #60a5fa; }
    .single-content th { background: #2a2a3a; border-bottom-color: #444; }
    .single-content td { border-bottom-color: #333; }
    .single-content tr:hover td { background: #2a2a2a; }
    .single-content hr { border-top-color: #333; }
    .single-content h2 { border-top-color: #333; }
    .claims-toolbar input, .claims-toolbar select { background: #2a2a2a; border-color: #444; color: #ddd; }
    .claims-table th { background: #2a2a3a; border-bottom-color: #444; }
    .claims-table th:hover { background: #333; }
    .claims-table td { border-bottom-color: #333; }
    .claims-table tr:hover td { background: #2a2a2a; }
    .claims-table a { color: #60a5fa; }
    .claim-action { color: #aaa; }
    .claim-notes { color: #f59e0b; }
    .doc-digest { background: #252525; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
    .doc-header { border-bottom-color: #333; }
    .doc-header .doc-channel { color: #4ade80; }
    .doc-header .doc-date { color: #eee; }
    .doc-header .doc-meta { color: #9ca3af; }
    .doc-deal-header { background: #1a2e1a; border-left-color: #4ade80; }
    .doc-deal-num { color: #4ade80; }
    .doc-deal-title { color: #eee; }
    .score-high { background: #14532d; color: #86efac; }
    .score-mid { background: #422006; color: #fde047; }
    .score-low { background: #450a0a; color: #fca5a5; }
    .doc-meta-table td:first-child { color: #9ca3af; }
    .doc-meta-table td:last-child { color: #ddd; }
    .doc-meta-table tr:nth-child(even) { background: #2a2a2a; }
    .doc-warning { background: #422006; border-left-color: #f59e0b; color: #fde68a; }
    .doc-section-divider { color: #9ca3af; border-top-color: #333; }
    .doc-cta-link { background: #16a34a; }
    .doc-cta-link:hover { background: #22c55e; }
    .doc-digest hr { border-top-color: #333; }
    .doc-digest a { color: #4ade80; }
  }

  @media (max-width: 600px) {
    .single-content table { font-size: .75rem; }
    .single-content th, .single-content td { padding: .35rem .4rem; }
    .claims-table { font-size: .75rem; }
    .claims-table td { padding: .35rem .4rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="scratchpad">Live Intel</button>
    <button class="tab" data-tab="summaries">Bearcave</button>
    <button class="tab" data-tab="casino-guide">Casino Guide</button>
    <button class="tab" data-tab="claims">Class Actions</button>
    <button class="tab" data-tab="doc-digest">DoC Digest</button>
    <a class="jackpot" href="https://play.rubysweeps.com/game/sunken-treasures" target="_blank" rel="noopener">Ruby Jackpot: </a>
  </div>
  <div id="scratchpad" class="tab-panel active">
    <div id="scratchpad-content"></div>
  </div>
  <div id="summaries" class="tab-panel">
  </div>
  <div id="casino-guide" class="tab-panel">
    <div id="casino-guide-content"></div>
  </div>
  <div id="claims" class="tab-panel">
  </div>
  <div id="doc-digest" class="tab-panel">
  </div>
</div>
<script>
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

function to12h(t) {
  if (/[ap]m/i.test(t)) return t.toUpperCase().replace(/(\d)(AM|PM)/, '$1 $2');
  const p = t.match(/^(\d{1,2}):(\d{2})$/);
  if (p) {
    let h = parseInt(p[1]), mn = p[2];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12;
    else if (h > 12) h -= 12;
    return h + ':' + mn + ' ' + ampm;
  }
  return t;
}

const data_scratchpad = "";
const data_summaries = [];
const data_casino_guide = "";
const data_doc_digest = [];

document.querySelectorAll('.tab-panel').forEach(panel => {
  const contentDiv = panel.querySelector('[id$="-content"]');
  if (contentDiv) contentDiv.classList.add('single-content');
});


(function() {
  const el = document.getElementById("scratchpad-content");
  const content = data_scratchpad;
  if (content) {
    el.innerHTML = marked.parse(content);
    el.querySelectorAll('td').forEach(td => {
      const m = td.textContent.match(/^(\d+\.?\d?)\/10$/);
      if (m) {
        const v = parseFloat(m[1]);
        if (v >= 7) td.classList.add('rating-high');
        else if (v >= 5) td.classList.add('rating-mid');
        else td.classList.add('rating-low');
      }
    });
  } else {
    el.innerHTML = '<div class="empty">No content found.</div>';
  }
})();

(function() {
  const el = document.getElementById("summaries");
  const entries = data_summaries;
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty">No entries yet.</div>';
  } else {
    entries.forEach(e => {
      const div = document.createElement("div");
      div.className = "summary";
      div.innerHTML = marked.parse(e.content);

      // Try to normalize any h1 or h2 into the styled header block
      const heading = div.querySelector('h1') || div.querySelector('h2');
      let parsed = false;
      if (heading) {
        const text = heading.textContent.trim();

        // Pattern 1: channel + Monitor/summary/alert + date + time
        let m = text.match(/^#?\s*([\w-]+)\s+(?:monitor|summary|alert)\s*[—–-]\s*(\d{4}-\d{2}-\d{2})\s+(.+)$/i);
        if (m) {
          const dateStr = m[2];
          let rawTime = m[3].replace(/^~/, '').replace(/\s+local$/i, '').split(/[—–-]/)[0].trim();
          const timeDisplay = to12h(rawTime);
          const [y, mo, d] = dateStr.split('-');
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const formatted = months[parseInt(mo)-1] + ' ' + parseInt(d) + ', ' + y + ' · ' + timeDisplay + ' EST';
          const hdr = document.createElement('div');
          hdr.className = 'header';
          hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + formatted + '</div>';
          heading.replaceWith(hdr);
          parsed = true;
        }

        // Pattern 2: "BEARCAVE ALERT — H:MM AM (Month DD, YYYY)"
        if (!parsed) {
          m = text.match(/alert\s*[—–-]\s*(\d{1,2}:\d{2}\s*[APap][Mm])\s*\((.+)\)/i);
          if (m) {
            const timeDisplay = to12h(m[1]);
            const hdr = document.createElement('div');
            hdr.className = 'header';
            hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + m[2].trim() + ' · ' + timeDisplay + ' EST</div>';
            heading.replaceWith(hdr);
            parsed = true;
          }
        }

        // Fallback: if heading looks bearcave-related but didn't parse, use filename
        if (!parsed && /bearcave/i.test(text)) {
          heading.remove();
        }
      }

      // If no heading was parsed, try to build header from filename (YYYY-MM-DD_HH-MM.md)
      if (!parsed) {
        const fm = e.filename.match(/^(\d{4})-(\d{2})-(\d{2})_(\d{2})-(\d{2})/);
        if (fm) {
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const timeDisplay = to12h(fm[4] + ':' + fm[5]);
          const formatted = months[parseInt(fm[2])-1] + ' ' + parseInt(fm[3]) + ', ' + fm[1] + ' · ' + timeDisplay + ' EST';
          const hdr = document.createElement('div');
          hdr.className = 'header';
          hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + formatted + '</div>';
          div.insertBefore(hdr, div.firstChild);
        }
      }

      // Strip leading paragraphs that duplicate header info (channel name, date/time lines)
      const firstChildren = Array.from(div.children);
      for (const child of firstChildren) {
        if (child.classList && child.classList.contains('header')) continue;
        if (child.tagName === 'P') {
          const t = child.textContent.trim();
          if (/^(bearcave|#bearcave)/i.test(t) || /^(Mon|Tue|Wed|Thu|Fri|Sat|Sun|Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s/i.test(t) || /^\d{4}-\d{2}-\d{2}/.test(t)) {
            child.remove();
            continue;
          }
        }
        if (child.tagName === 'HR') { child.remove(); continue; }
        break;
      }

      // Promote section labels to styled headings
      div.querySelectorAll('p').forEach(p => {
        const t = p.textContent.trim();
        const m = t.match(/^(.{0,3})(Actionable|Notable Context|Filtered|Energy)\b(.*)$/i);
        if (m && t.length < 120) {
          const h = document.createElement('h2');
          h.className = 'section-label';
          h.innerHTML = p.innerHTML;
          p.replaceWith(h);
        }
      });

      div.querySelectorAll('h3').forEach(h3 => {
        h3.innerHTML = h3.innerHTML.replace(/\s*\(\d{1,2}:\d{2}(\s*[APap][Mm])?\)\s*/g, ' ').trim();
      });
      el.appendChild(div);
    });
  }
})();

(function() {
  const el = document.getElementById("casino-guide-content");
  const content = data_casino_guide;
  if (content) {
    el.innerHTML = marked.parse(content);
    el.querySelectorAll('td').forEach(td => {
      const m = td.textContent.match(/^(\d+\.?\d?)\/10$/);
      if (m) {
        const v = parseFloat(m[1]);
        if (v >= 7) td.classList.add('rating-high');
        else if (v >= 5) td.classList.add('rating-mid');
        else td.classList.add('rating-low');
      }
    });
  } else {
    el.innerHTML = '<div class="empty">No content found.</div>';
  }
})();

(function() {
  const el = document.getElementById("doc-digest");
  const entries = data_doc_digest;
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty">No entries yet.</div>';
  } else {
    entries.forEach(e => {
      const div = document.createElement("div");
      div.className = "doc-digest";
      div.innerHTML = marked.parse(e.content);

      // Transform the h1 into a styled digest header
      const h1 = div.querySelector('h1');
      if (h1) {
        const text = h1.textContent.trim();
        // Extract date from "DoC Daily Digest — March 13, 2026"
        const m = text.match(/digest\s*[—–-]\s*(.+)$/i);
        const hdr = document.createElement('div');
        hdr.className = 'doc-header';
        hdr.innerHTML = '<div class="doc-channel">DOCTOR OF CREDIT</div>'
          + '<div class="doc-date">' + (m ? m[1].trim() : text) + '</div>';
        // Pull out the subtitle line (posts scanned / offers found)
        const nextEl = h1.nextElementSibling;
        if (nextEl && nextEl.tagName === 'P' && /posts scanned/i.test(nextEl.textContent)) {
          hdr.innerHTML += '<div class="doc-meta">' + nextEl.innerHTML + '</div>';
          nextEl.remove();
        }
        h1.replaceWith(hdr);
      }

      // Remove leading <hr> right after header
      const firstHr = div.querySelector('.doc-header + hr');
      if (firstHr) firstHr.remove();

      // Style each deal section (## #N — Title [Score: N])
      div.querySelectorAll('h2').forEach(h2 => {
        const t = h2.textContent.trim();
        const dealMatch = t.match(/^#(\d+)\s*[—–-]\s*(.+?)\s*\[Score:\s*(\d+)\]/i);
        if (dealMatch) {
          const num = dealMatch[1];
          const title = dealMatch[2].trim();
          const score = dealMatch[3];
          const badge = document.createElement('div');
          badge.className = 'doc-deal-header';
          let scoreClass = 'score-low';
          if (parseInt(score) >= 60) scoreClass = 'score-high';
          else if (parseInt(score) >= 35) scoreClass = 'score-mid';
          badge.innerHTML = '<span class="doc-deal-num">#' + num + '</span>'
            + '<span class="doc-deal-title">' + title + '</span>'
            + '<span class="doc-deal-score ' + scoreClass + '">' + score + '</span>';
          h2.replaceWith(badge);
        }
        // "Also Posted" section header
        const alsoMatch = t.match(/also posted/i);
        if (alsoMatch) {
          h2.className = 'doc-section-divider';
        }
        // "Notes" section
        if (/^notes$/i.test(t)) {
          h2.className = 'doc-section-divider doc-notes-header';
        }
      });

      // Style metadata tables (the 2-col key/value tables)
      div.querySelectorAll('table').forEach(table => {
        const rows = table.querySelectorAll('tr');
        const cols = rows.length > 0 ? rows[0].querySelectorAll('td, th') : [];
        if (cols.length === 2) {
          table.className = 'doc-meta-table';
        }
      });

      // Style blockquotes as warning callouts
      div.querySelectorAll('blockquote').forEach(bq => {
        bq.className = 'doc-warning';
      });

      // Style "View on Doctor of Credit" links
      div.querySelectorAll('a').forEach(a => {
        if (/view on doctor of credit/i.test(a.textContent) || /full details/i.test(a.textContent)) {
          const wrapper = document.createElement('div');
          wrapper.className = 'doc-cta';
          const btn = a.cloneNode(true);
          btn.className = 'doc-cta-link';
          wrapper.appendChild(btn);
          if (a.parentElement && a.parentElement.tagName === 'P') {
            a.parentElement.replaceWith(wrapper);
          } else {
            a.replaceWith(wrapper);
          }
        }
      });

      el.appendChild(div);
    });
  }
})();


/* ── Claims tab ── */
(function() {
  const el = document.getElementById('claims');
  if (!el) return;
  const claims = [];
  if (claims.length === 0) { el.innerHTML = '<div class="empty">No claims found.</div>'; return; }

  const today = new Date();
  today.setHours(0,0,0,0);

  function daysUntil(d) {
    if (!d) return 9999;
    const dt = new Date(d + 'T00:00:00');
    return Math.ceil((dt - today) / 86400000);
  }

  function deadlineClass(d) {
    const days = daysUntil(d);
    if (days <= 14) return 'deadline-urgent';
    if (days <= 30) return 'deadline-soon';
    return '';
  }

  function statusClass(s) {
    if (!s) return '';
    const low = s.toLowerCase();
    if (low === 'new') return 'status-new';
    if (low === 'filed' || low === 'completed') return 'status-filed';
    if (low.includes('review')) return 'status-review';
    return '';
  }

  function fmtDeadline(d) {
    if (!d) return '—';
    const dt = new Date(d + 'T00:00:00');
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = daysUntil(d);
    let label = mo[dt.getMonth()] + ' ' + dt.getDate();
    if (days <= 30 && days >= 0) label += ' (' + days + 'd)';
    return label;
  }

  // State
  let sortCol = 'deadline';
  let sortAsc = true;
  let filterText = '';
  let filterStatus = '';
  let filterCategory = '';

  // Get unique categories and statuses
  const categories = [...new Set(claims.map(c => c.category).filter(Boolean))].sort();
  const statuses = [...new Set(claims.flatMap(c => [c.you, c.spouse]).filter(Boolean))].sort();

  function render() {
    let filtered = claims.filter(c => {
      if (filterText) {
        const q = filterText.toLowerCase();
        const searchable = (c.name + ' ' + c.company + ' ' + c.action + ' ' + c.category).toLowerCase();
        if (!searchable.includes(q)) return false;
      }
      if (filterStatus && c.you !== filterStatus && c.spouse !== filterStatus) return false;
      if (filterCategory && c.category !== filterCategory) return false;
      return true;
    });

    filtered.sort((a, b) => {
      let va = a[sortCol] || '', vb = b[sortCol] || '';
      if (sortCol === 'deadline') {
        va = va || '9999'; vb = vb || '9999';
      }
      const cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return sortAsc ? cmp : -cmp;
    });

    const cols = [
      { key: 'name', label: 'Claim' },
      { key: 'deadline', label: 'Deadline' },
      { key: 'you', label: 'You' },
      { key: 'spouse', label: 'Spouse' },
      { key: 'payout', label: 'Payout' },
      { key: 'proof', label: 'Proof' },
      { key: 'action', label: 'Action' },
    ];

    let html = '<div class="claims-toolbar">';
    html += '<input type="text" id="claims-search" placeholder="Search claims..." value="' + filterText.replace(/"/g,'&quot;') + '">';
    html += '<select id="claims-status"><option value="">All statuses</option>';
    statuses.forEach(s => html += '<option value="' + s + '"' + (filterStatus===s?' selected':'') + '>' + s + '</option>');
    html += '</select>';
    html += '<select id="claims-cat"><option value="">All categories</option>';
    categories.forEach(c => html += '<option value="' + c + '"' + (filterCategory===c?' selected':'') + '>' + c + '</option>');
    html += '</select></div>';

    html += '<div class="claims-wrap"><table class="claims-table"><thead><tr>';
    cols.forEach(col => {
      const arrow = sortCol === col.key ? (sortAsc ? '▲' : '▼') : '▴';
      const active = sortCol === col.key ? ' active' : '';
      html += '<th data-col="' + col.key + '">' + col.label + '<span class="sort-arrow' + active + '">' + arrow + '</span></th>';
    });
    html += '</tr></thead><tbody>';

    if (filtered.length === 0) {
      html += '<tr><td colspan="' + cols.length + '" style="text-align:center;color:#888;padding:1.5rem">No matching claims</td></tr>';
    }

    filtered.forEach(c => {
      const dlClass = deadlineClass(c.deadline);
      const nameCell = c.link
        ? '<a href="' + c.link + '" target="_blank" rel="noopener">' + c.name + '</a>'
        : c.name;
      const notesHtml = c.notes ? '<div class="claim-notes">' + c.notes + '</div>' : '';

      html += '<tr>';
      html += '<td>' + nameCell + notesHtml + '</td>';
      html += '<td class="' + dlClass + '">' + fmtDeadline(c.deadline) + '</td>';
      html += '<td class="' + statusClass(c.you) + '">' + (c.you || '—') + '</td>';
      html += '<td class="' + statusClass(c.spouse) + '">' + (c.spouse || '—') + '</td>';
      html += '<td>' + (c.payout || '—') + '</td>';
      html += '<td>' + (c.proof || '—') + '</td>';
      html += '<td><div class="claim-action">' + (c.action || '—') + '</div></td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    el.innerHTML = html;

    // Bind events
    document.getElementById('claims-search').addEventListener('input', function(e) {
      filterText = e.target.value; render();
    });
    document.getElementById('claims-status').addEventListener('change', function(e) {
      filterStatus = e.target.value; render();
    });
    document.getElementById('claims-cat').addEventListener('change', function(e) {
      filterCategory = e.target.value; render();
    });
    el.querySelectorAll('.claims-table th').forEach(th => {
      th.addEventListener('click', function() {
        const col = this.dataset.col;
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        render();
      });
    });
  }

  render();
})();
</script>
</body>
</html>
