function to12h(t) {
  if (/[ap]m/i.test(t)) return t.toUpperCase().replace(/(\d)(AM|PM)/, '$1 $2');
  const p = t.match(/^(\d{1,2}):(\d{2})$/);
  if (p) {
    let h = parseInt(p[1]), mn = p[2];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12;
    else if (h > 12) h -= 12;
    return h + ':' + mn + ' ' + ampm;
  }
  return t;
}

single yay link ever, just loads to the login page.\" Skipped.\n* Luck Party personalized purchase links posted by Nolskeet throughout (4.99/7, 1.99/2.4, 5.99/7.2sc) \u2014 personalized links that don't work for others. Filtered.\n* SSH merch shirt photo (Goth Sada Baby) and merch model contest teaser (dogbear209) \u2014 off-topic.\n* Zula Casino meme GIF (Kegs, x2) \u2014 reaction content, noted in Notable Context.\n* PlayFame \"Better luck next time\" screenshots (KKNguyen) \u2014 giveaway complaint, not actionable.\n* Jefebet redemption timeline questions (blitz28179) \u2014 support timing complaint, not actionable beyond the PB note above.\n* General chit-chat: horse GIFs, anti-degen club jokes, rules bot trigger \u2014 off-topic.\n\nEnergy\nActive and sustained from ~9:00 PM through 9:47 PM with approximately 70\u201380 messages across the window. Busiest clusters formed around the Yotta deal drop (9:09 PM) and the St. Patty's limited offer (9:42 PM), with a steady thread of Luck Party and Sportzino ban intel throughout. Tone was deal-focused and engaged, with a running thread of meme humor about Zula's broken promo codes. No urgent items appear to have been missed.\n"}, {"filename": "2026-03-13_21-14.md", "content": "BEARCAVE-CHAT\nMar 13, 2026 \u00b7 9:14 PM EDT\n\n\ud83c\udfaf Actionable\n\nLuck Party Email: 30 Free Spins in Diamond X (ThE-ShAdOw, 9:00 PM)\n* \"I just got an email from luck party for 30 fs in diamond x. Check emails or try loading the game in sc\"\n* McLovin confirmed it worked at 8:59 PM responding to Amkuse who tipped it earlier\n* Load the game from within the social casino app if the email link doesn't work directly\n\nLuck Party Flash Purchase Deals \u2014 Email Campaign (Nolskeet, 9:10\u20139:11 PM)\n* $5.99 \u2192 7.2 SC | $4.99 \u2192 7.0 SC | $1.99 \u2192 2.4 SC \u2014 all posted from personal email tracking links\n* HungryKitten passed on the later deals: \"The profit margin is too thin for me\"\n* coryanderson830 and Darb both say urchased 2 days ago\n* No mod response or resolution visible in chat \u2014 worth watching for further reports\n\nMoozi Login Issue (SteadySniper, 8:29 PM)\n* \"unable to login to moozi 'invalid credential' down or banned?\" \u2014 no follow-up or confirmation in chat\n\nEnergy\nActive, engaged session with roughly 60+ messages from 7:34-8:39 PM. The dominant thread was a deep LuckyRush strategy breakdown led by Zhev with multiple users asking genuine follow-up questions \u2014 learning energy, not hype. The Friday 15% sale being live drove the most immediate excitement and is the clear action item for tonight.\n"}, {"filename": "2026-03-13_20-26.md", "content": "BEARCAVE-CHAT\nMar 13, 2026 \u00b7 8:26 PM EST\n\n\ud83c\udfaf Actionable\n\nYotta Happy Hour deals posted (screenshot ~7:07 PM)\n* Happy Hour: 7,000,000 tokens for $159.99 (was $225) \u2014 timer showed ~1hr 54min at time of post, likely expiring ~9 PM\n* Happy Hour: 8,000,000 tokens for $175.99 (was $500) \u2014 timer showed ~2hr 59min, likely expiring ~10 PM\n* 25% Bonus Offer: 1,100,000 tokens for $25.99 also live\n* Darb and beefyburger said they had no Yotta deals \u2014 appears account-level targeted\n\nLuckyRush Friday 15% sale \u2014 confirmed live, timing quirk (Zhev/Valskeet/Luffles, 7:53\u20138:22 PM)\n* Zhev thought he was cut off \u2014 sale didn't arrive via email and wasn't visible until 8 PM online\n* Valskeet confirmed 15% off up to $50 packs in regular store; Luffles confirmed mobile showed it earlier\n* Stack with weekly/monthly promo per Zhev: \"fridays they run 2 hours 15% off all reg packs up to $50 / you can stack it with their weekly/monthly promo thing\"\n* LuckyRush can't purchase if SC balance over 50 \u2014 Zhev workaround: initiate a redeem, buy packs, cancel redeem, repeat; only one pack per level at a time\n\nSolar Gold Supernova promo unlocked (unknown user, 8:11 PM)\n* Promo email screenshot posted: \"$79.99 \u2192 200,000 GC + 100 FREE SC + 30 Free Spins on John's Book\"\n         if (m) {
          const dateStr = m[2];

          const timeDisplay = to12h(rawTime);
          const [y, mo, d] = dateStr.split('-');
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const formatted = months[parseInt(mo)-1] + ' ' + parseInt(d) + ', ' + y + ' · ' + timeDisplay + ' EST';
          const hdr = document.createElement('div');
          hdr.className = 'header';
          hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + formatted + '</div>';
          heading.replaceWith(hdr);
          parsed = true;

        // Pattern 2: "BEARCAVE ALERT — H:MM AM (Month DD, YYYY)"
        if (!parsed) {
          m = text.match(/alert\s*[—–-]\s*(\d{1,2}:\d{2}\s*[APap][Mm])\s*\((.+)\)/i);
          if (m) {
            const timeDisplay = to12h(m[1]);

            heading.replaceWith(hdr);
            parsed = true;
          }
        }

        // Fallback: if heading looks bearcave-related but didn't parse, use filename

            continue;

  if (claims.length === 0) { el.innerHTML = '<div class="empty">No claims found.</div>'; return; }

  const today = new Date();
  today.setHours(0,0,0,0);

  function daysUntil(d) {
    if (!d) return 9999;
    const dt = new Date(d + 'T00:00:00');
    return Math.ceil((dt - today) / 86400000);
  }

  function deadlineClass(d) {
    const days = daysUntil(d);
    if (days <= 14) return 'deadline-urgent';
    if (days <= 30) return 'deadline-soon';
    return '';
  }

  function statusClass(s) {
    if (!s) return '';
    const low = s.toLowerCase();
    if (low === 'new') return 'status-new';
    if (low === 'filed' || low === 'completed') return 'status-filed';
    if (low.includes('review')) return 'status-review';
    return '';
  }

  function fmtDeadline(d) {
    if (!d) return '—';
    const dt = new Date(d + 'T00:00:00');
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = daysUntil(d);
    let label = mo[dt.getMonth()] + ' ' + dt.getDate();
    if (days <= 30 && days >= 0) label += ' (' + days + 'd)';
    return label;
  }

  // State
  let sortCol = 'deadline';
  let sortAsc = true;
  let filterText = '';
  let filterStatus = '';
  let filterCategory = '';

  // Get unique categories and statuses
  const categories = [...new Set(claims.map(c => c.category).filter(Boolean))].sort();
  const statuses = [...new Set(claims.flatMap(c => [c.you, c.spouse]).filter(Boolean))].sort();

  function render() {
    let filtered = claims.filter(c => {
      if (filterText) {
        const q = filterText.toLowerCase();
        const searchable = (c.name + ' ' + c.company + ' ' + c.action + ' ' + c.category).toLowerCase();
        if (!searchable.includes(q)) return false;
      }
      if (filterStatus && c.you !== filterStatus && c.spouse !== filterStatus) return false;
      if (filterCategory && c.category !== filterCategory) return false;
      return true;
    });

    filtered.sort((a, b) => {
      let va = a[sortCol] || '', vb = b[sortCol] || '';
      if (sortCol === 'deadline') {
        va = va || '9999'; vb = vb || '9999';
      }
      const cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return sortAsc ? cmp : -cmp;
    });

    const cols = [
      { key: 'name', label: 'Claim' },
      { key: 'deadline', label: 'Deadline' },
      { key: 'you', label: 'You' },
      { key: 'spouse', label: 'Spouse' },
      { key: 'payout', label: 'Payout' },
      { key: 'proof', label: 'Proof' },
      { key: 'action', label: 'Action' },
    ];

    let html = '<div class="claims-toolbar">';

    html += '<select id="claims-status"><option value="">All statuses</option>';
    statuses.forEach(s => html += '<option value="' + s + '"' + (filterStatus===s?' selected':'') + '>' + s + '</option>');
    html += '</select>';
    html += '<select id="claims-cat"><option value="">All categories</option>';
    categories.forEach(c => html += '<option value="' + c + '"' + (filterCategory===c?' selected':'') + '>' + c + '</option>');
    html += '</select></div>';

    html += '<div class="claims-wrap"><table class="claims-table"><thead><tr>';
    cols.forEach(col => {
      const arrow = sortCol === col.key ? (sortAsc ? '▲' : '▼') : '▴';
      const active = sortCol === col.key ? ' active' : '';
      html += '<th data-col="' + col.key + '">' + col.label + '<span class="sort-arrow' + active + '">' + arrow + '</span></th>';
    });
    html += '</tr></thead><tbody>';

    if (filtered.length === 0) {
      html += '<tr><td colspan="' + cols.length + '" style="text-align:center;color:#888;padding:1.5rem">No matching claims</td></tr>';
    }

    filtered.forEach(c => {
      const dlClass = deadlineClass(c.deadline);
      const nameCell = c.link
        ? '<a href="' + c.link + '" target="_blank" rel="noopener">' + c.name + '</a>'
        : c.name;
      const notesHtml = c.notes ? '<div class="claim-notes">' + c.notes + '</div>' : '';

      html += '<tr>';
      html += '<td>' + nameCell + notesHtml + '</td>';
      html += '<td class="' + dlClass + '">' + fmtDeadline(c.deadline) + '</td>';
      html += '<td class="' + statusClass(c.you) + '">' + (c.you || '—') + '</td>';
      html += '<td class="' + statusClass(c.spouse) + '">' + (c.spouse || '—') + '</td>';
      html += '<td>' + (c.payout || '—') + '</td>';
      html += '<td>' + (c.proof || '—') + '</td>';
      html += '<td><div class="claim-action">' + (c.action || '—') + '</div></td>';
      html += '</tr>';

    });
    document.getElementById('claims-cat').addEventListener('change', function(e) {

    });

        render();
      });
    });
  }
