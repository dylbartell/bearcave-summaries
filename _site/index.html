  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

function to12h(t) {
  if (/[ap]m/i.test(t)) return t.toUpperCase().replace(/(\d)(AM|PM)/, '$1 $2');
  const p = t.match(/^(\d{1,2}):(\d{2})$/);
  if (p) {
    let h = parseInt(p[1]), mn = p[2];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12;
    else if (h > 12) h -= 12;
    return h + ':' + mn + ' ' + ampm;
  }
  return t;
}

$49.99 on YouTube TV and get $20 back as a statement credit \u2014 this can be done three times for up to $60 total back. Great for anyone who already uses or is willing to try YouTube TV. If you don't currently subscribe, a one-month trial + cancellation makes this essentially a $20 profit.\n\n> **Verify before acting:** This is a targeted offer \u2014 check your AmEx card's offers section to confirm it's available to you before planning around it.\n\n**Key details:**\n\n- Must add the offer to your eligible AmEx card first (check the AmEx app or online portal).\n- Spend must be $49.99+ at YouTube TV per transaction; up to 3 uses.\n- Statement credit posts within a few days of qualifying purchase.\n- Expires March 20, 2026 \u2014 five days remaining.\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/)\n\n---\n\n## #3 \u2014 Q2 2026 5% Quarterly Categories \u2014 Activate Now [Score: 70]\n\n| | |\n|---|---|\n| **Type** | Credit Card Cashback (activation required) |\n| **Cash Value** | Up to $75/card on $1,500 spend; multiple cards = $150\u2013$225+ potential |\n| **Effort** | Easy \u2014 activate each card online or via app before April 1 |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | Activation window open now; Q2 runs April 1 \u2013 June 30, 2026 |\n| **Posted** | ~March 14, 2026 |\n\nQ2 2026 starts April 1 \u2014 now is the time to activate 5% category bonuses on Chase Freedom/Flex, Discover IT, Citi Dividend, and US Bank Cash+. Chase Freedom/Flex earns 5% on Amazon, Chase Travel, and Feeding America (up to $1,500 combined). Discover earns 5% on Restaurants and Home Improvement Stores. Don't leave free money on the table by forgetting to activate.\n\n**Key details:**\n\n- **Chase Freedom / Freedom Flex**: 5% on Amazon, Chase Travel & Feeding America (up to $1,500 spend cap = $75 max per card).\n- **Discover IT**: 5% on Restaurants and Home Improvement Stores (up to $1,500 = $75 max).\n- **Citi Dividend**: 5% on Grocery Store *Posted this week*\n\n- **HSBC $1,500\u2013$7,000 Checking Bonus** \u2014 Very high value but requires large deposit/investment ($10K\u2013$100K+); Hard effort, PA eligibility unknown. Ongoing through June 30, 2026. [Link](https://www.doctorofcredit.com/hsbc-1500-7000-checking-bonus/) \u00b7 *Ongoing*\n\n- **Central Bank $300\u2013$800 Checking Bonus (Promo Code: STEP)** \u2014 Increased to $300 minimum; expires April 30, 2026; PA eligibility unconfirmed, worth checking. [Link](https://www.doctorofcredit.com/best-bank-account-bonuses/) \u00b7 *Updated March 14, 2026*\n\n- **Martin's Food: 2x Fuel Points on Mastercard Gift Cards** \u2014 Earn double fuel points on Mastercard GCs through March 19 at Martin's (PA-present chain). Low direct cash value but stackable. [Link](https://www.doctorofcredit.com/) \u00b7 *Expires 3/19*\n\n- **Marriott Amex Best-Ever Welcome Offers: 175K\u2013200K Points** \u2014 Bonvoy Bevy (175K/$5K spend/6mo) and Bonvoy Brilliant (200K/$6K spend/6mo); travel-focused, not direct cash. [Link](https://frequentmiler.com/marriott-amex-cards-best-ever-welcome-offers/) \u00b7 *Posted this week*\n\n---\n\n## Notes\n\nToday is a moderately active day dominated by the Huntington Bank bonus expiring at midnight \u2014 that is the single most time-sensitive item and should be acted on immediately if eligible. The Q2 5% category activation is a no-effort, high-return reminder that's easy to miss. Coverage from FrequentMiler and DoC is broadly consistent today.\n\n*Retrieval method: WebSearch (doctorofcredit.com blocked at network level). Always verify offer status at the linked URL before acting.*\n"}, {"filename": "DoC-Digest-2026-03-14.md", "content": "# DoC Daily Digest \u2014 March 14, 2026\n\n**~6 posts scanned** \u00b7 **2 cash-value offers found** \u00b7 Retrieved via WebSearch\n\n---\n\n## #1 \u2014 T-Mobile: Free 2026 MLB.TV Season Subscription [Score: 70]\n\n| | |\n|---|---|\n| **Type** | Free Subscription / Deal |\n| **Cash Value** | ~$150 (MLB.TV full season retail ~$149.99) |\n| **Effort** | Easy \u2014 redeem through the T-Life app |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | Redemption window: 3/25/2026\u20133/31/2026 |\n| **Posted** | ~March 13\u201314, 2026 |\n\nT-Mobile is offering a free full 2026 MLB season subscription via the T-Life app. If you're a T-Mobile customer and a baseball fan (or know one), this is an easy $150 free. The redemption window opens March 25, so mark your calendar now.\n\n**Key details:**\n\n- Must be a T-Mobile subscriber to claim\n- Redeem through the T-Life app between 3/25/2026 and 3/31/2026\n- Full season access to all out-of-market MLB games; local blackout restrictions apply\n- No additional purchase required\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/t-mobile-free-2026-season-of-mlb-tv-subscription-3-25-3-31/)\n\n---\n\n## #2 \u2014 7-Eleven / Speedway / Stripes: Any Large Pizza $3.14 [Score: 65]\n\n| | |\n|---|---|\n| **Type** | Food Deal |\n| **Cash Value** | ~$6\u2013$9 savings (pizza normally $9\u2013$12) |\n| **Effort** | Easy \u2014 app order or in-store with rewards membership |\n| **Available** | Nationwide at participating locations \u2014 PA eligible: Yes |\n| **Expires** | Today only \u2014 3/14/2026 (Pi Day) |\n| **Posted** | March 13, 2026 |\n\nPi Day special: any whole large pizza for $3.14 at 7-Eleven, Speedway, and Stripes stores. Available in-store and through the 7NOW Delivery app for 7Rewards/Speedy Rewards members. Low effort for a real discount on a $9\u2013$12 pizza.\n\n> **Act today:** This deal expires end of day March 14. If you haven't grabbed it yet, now is the time.\n\n**Key details:**\n\n- Must be a 7Rewards or Speedy Rewards member (free to join)\n- Available in-store and via 7NOW Delivery app\n- One per customer limits may apply \u2014 check app for details\n- 7-Eleven locations in PA are eligible\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/7-eleven-any-large-pizza-3-14-3-14-3-15/)\n\n---\n\n## Also Posted (Non-Cash / Informational)\n\n- **New ACH Rules Go Into Effect March 20, 2026** \u2014 NACHA implementing new fraud monitoring rules and standardized \"PAYROLL\" company entry descriptions; affects how direct deposits are labeled. [Link](https://www.doctorofcredit.com/new-ach-rules-go-into-effect-march-20-2026-payroll-description-ai-detection-tools/) \u00b7 *Posted March 13\u201314, 2026*\n\n- **Maximizing Capital One Shopping Portal Offers** \u2014 Reader tips and tricks for getting the most out of Capital One Shopping portal cashback. [Link](https://www.doctorofcredit.com/maximizing-capital-one-shopping-portal-offers/) \u00b7 *Posted March 13, 2026*\n\n- **[FL, IL, IN, MO] Busey Bank $200\u2013$500 Checking Bonus** \u2014 Solid bank bonus but limited to four states; PA not included. Score: 50 but not actionable for PA. \u00b7 *Posted ~March 14, 2026*\n\n---\n\n## Notes\n\nLight day for PA-actionable cash offers \u2014 the big bank bonuses (Truist $400, TD Bank up to $500 checking+savings) are ongoing and worth checking if you haven't done them yet. The T-Mobile MLB.TV deal is the standout for the week; set a reminder for 3/25 to claim it. ACH rule changes on 3/20 are mostly background news unless you're monitoring direct deposit triggers for bank bonuses.\n\n*Retrieval method: WebSearch (doctorofcredit.com blocked at network level). Always verify offer status at the linked URL before acting.*\n"}, {"filename": "DoC-Digest-2026-03-13.md", "content": "# DoC Daily Digest \u2014 March 13, 2026\n\n**~5 posts scanned** \u00b7 **1 cash-value offer found** \u00b7 Retrieved via WebSearch\n\n---\n\n## #1 \u2014 Amazon: Save 15% On Gift Cards (Uber, Hotels.com, PetSmart) [Score: 60]\n\n| | |\n|---|---|\n| **Type** | Gift Card Discount (Cash Equivalent) |\n| **Cash Value** | ~$15\u2013$45 depending on how many you buy |\n| **Effort** | Easy \u2014 online, no special membership required |\n| **Available** | Nationwide \u2014 PA eligible: Yes (function() {
  const el = document.getElementById("summaries");
  const entries = data_summaries;
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty">No entries yet.</div>';
  } else {
    entries.forEach(e => {
      const div = document.createElement("div");
      div.className = "summary";
      div.innerHTML = marked.parse(e.content);

      // Try to normalize any h1 or h2 into the styled header block
      const heading = div.querySelector('h1') || div.querySelector('h2');
      let parsed = false;
      if (heading) {
        const text = heading.textContent.trim();

        // Pattern 1: channel + Monitor/summary/alert + date + time
        let m = text.match(/^#?\s*([\w-]+)\s+(?:monitor|summary|alert)\s*[—–-]\s*(\d{4}-\d{2}-\d{2})\s+(.+)$/i);
        if (m) {
          const dateStr = m[2];
          let rawTime = m[3].replace(/^~/, '').replace(/\s+local$/i, '').split(/[—–-]/)[0].trim();
          const timeDisplay = to12h(rawTime);
          const [y, mo, d] = dateStr.split('-');
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const formatted = months[parseInt(mo)-1] + ' ' + parseInt(d) + ', ' + y + ' · ' + timeDisplay + ' EST';
          const hdr = document.createElement('div');
          hdr.className = 'header';
          hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + formatted + '</div>';
          heading.replaceWith(hdr);
          parsed = true;
        }

        // Pattern 2: "BEARCAVE ALERT — H:MM AM (Month DD, YYYY)"
        if (!parsed) {
          m = text.match(/alert\s*[—–-]\s*(\d{1,2}:\d{2}\s*[APap][Mm])\s*\((.+)\)/i);
          if (m) {
            const timeDisplay = to12h(m[1]);
            const hdr = document.createElement('div');
            hdr.className = 'header';
            hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + m[2].trim() + ' · ' + timeDisplay + ' EST</div>';
            heading.replaceWith(hdr);
            parsed = true;
          }
        }

        // Fallback: if heading looks bearcave-related but didn't parse, use filename
        if (!parsed && /bearcave/i.test(text)) {
          heading.remove();
        }
      }

      // If no heading was parsed, try to build header from filename (YYYY-MM-DD_HH-MM.md)
      if (!parsed) {
        const fm = e.filename.match(/^(\d{4})-(\d{2})-(\d{2})_(\d{2})-(\d{2})/);
        if (fm) {
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const timeDisplay = to12h(fm[4] + ':' + fm[5]);
          const formatted = months[parseInt(fm[2])-1] + ' ' + parseInt(fm[3]) + ', ' + fm[1] + ' · ' + timeDisplay + ' EST';
          const hdr = document.createElement('div');
          hdr.className = 'header';
          hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + formatted + '</div>';
          div.insertBefore(hdr, div.firstChild);
        }
      }

      // Strip leading paragraphs that duplicate header info (channel name, date/time lines)
      const firstChildren = Array.from(div.children);
      for (const child of firstChildren) {
        if (child.classList && child.classList.contains('header')) continue;
        if (child.tagName === 'P') {
          const t = child.textContent.trim();
          if (/^(bearcave|#bearcave)/i.test(t) || /^(Mon|Tue|Wed|Thu|Fri|Sat|Sun|Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s/i.test(t) || /^\d{4}-\d{2}-\d{2}/.test(t)) {
            child.remove();
            continue;
          }
        }
        if (child.tagName === 'HR') { child.remove(); continue; }
        break;
      }

      // Promote section labels to styled headings
      div.querySelectorAll('p').forEach(p => {
        const t = p.textContent.trim();
        const m = t.match(/^(.{0,3})(Actionable|Notable Context|Filtered|Energy)\b(.*)$/i);
        if (m && t.length < 120) {
          const h = document.createElement('h2');
          h.className = 'section-label';
          h.innerHTML = p.innerHTML;
          p.replaceWith(h);
        }
      });

      div.querySelectorAll('h3').forEach(h3 => {
        h3.innerHTML = h3.innerHTML.replace(/\s*\(\d{1,2}:\d{2}(\s*[APap][Mm])?\)\s*/g, ' ').trim();
      });
      el.appendChild(div);
    });
  }
})();

(function() {
  const el = document.getElementById("doc-digest");
  const entries = data_doc_digest;
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty">No entries yet.</div>';
  } else {
    entries.forEach(e => {
      const div = document.createElement("div");
      div.className = "doc-digest";
      div.innerHTML = marked.parse(e.content);

      // Transform the h1 into a styled digest header
      const h1 = div.querySelector('h1');
      if (h1) {
        const text = h1.textContent.trim();
        // Extract date from "DoC Daily Digest — March 13, 2026"
        const m = text.match(/digest\s*[—–-]\s*(.+)$/i);
        const hdr = document.createElement('div');
        hdr.className = 'doc-header';
        hdr.innerHTML = '<div class="doc-channel">DOCTOR OF CREDIT</div>'
          + '<div class="doc-date">' + (m ? m[1].trim() : text) + '</div>';
        // Pull out the subtitle line (posts scanned / offers found)
        const nextEl = h1.nextElementSibling;
        if (nextEl && nextEl.tagName === 'P' && /posts scanned/i.test(nextEl.textContent)) {
          hdr.innerHTML += '<div class="doc-meta">' + nextEl.innerHTML + '</div>';
          nextEl.remove();
        }
        h1.replaceWith(hdr);
      }

      // Remove leading <hr> right after header
      const firstHr = div.querySelector('.doc-header + hr');
      if (firstHr) firstHr.remove();

      // Style each deal section (## #N — Title [Score: N])
      div.querySelectorAll('h2').forEach(h2 => {
        const t = h2.textContent.trim();
        const dealMatch = t.match(/^#(\d+)\s*[—–-]\s*(.+?)\s*\[Score:\s*(\d+)\]/i);
        if (dealMatch) {
          const num = dealMatch[1];
          const title = dealMatch[2].trim();
          const score = dealMatch[3];
          const badge = document.createElement('div');
          badge.className = 'doc-deal-header';
          let scoreClass = 'score-low';
          if (parseInt(score) >= 60) scoreClass = 'score-high';
          else if (parseInt(score) >= 35) scoreClass = 'score-mid';
          badge.innerHTML = '<span class="doc-deal-num">#' + num + '</span>'
            + '<span class="doc-deal-title">' + title + '</span>'
            + '<span class="doc-deal-score ' + scoreClass + '">' + score + '</span>';
          h2.replaceWith(badge);
        }
        // "Also Posted" section header
        const alsoMatch = t.match(/also posted/i);
        if (alsoMatch) {
          h2.className = 'doc-section-divider';
        }
        // "Notes" section
        if (/^notes$/i.test(t)) {
          h2.className = 'doc-section-divider doc-notes-header';
        }
      });

      // Style metadata tables (the 2-col key/value tables)
      div.querySelectorAll('table').forEach(table => {
        const rows = table.querySelectorAll('tr');
        const cols = rows.length > 0 ? rows[0].querySelectorAll('td, th') : [];
        if (cols.length === 2) {
          table.className = 'doc-meta-table';
        }
      });

      // Style blockquotes as warning callouts
      div.querySelectorAll('blockquote').forEach(bq => {
        bq.className = 'doc-warning';
      });

      // Style "View on Doctor of Credit" links
      div.querySelectorAll('a').forEach(a => {
        if (/view on doctor of credit/i.test(a.textContent) || /full details/i.test(a.textContent)) {
          const wrapper = document.createElement('div');
          wrapper.className = 'doc-cta';
          const btn = a.cloneNode(true);
          btn.className = 'doc-cta-link';
          wrapper.appendChild(btn);
          if (a.parentElement && a.parentElement.tagName === 'P') {
            a.parentElement.replaceWith(wrapper);
          } else {
            a.replaceWith(wrapper);
          }
        }
      });

      el.appendChild(div);
    });
  }
})();

  // Get unique categories and statuses
  const categories = [...new Set(claims.map(c => c.category).filter(Boolean))].sort();
  const statuses = [...new Set(claims.flatMap(c => [c.you, c.spouse]).filter(Boolean))].sort();

  function render() {
    let filtered = claims.filter(c => {
      if (filterText) {
        const q = filterText.toLowerCase();
        const searchable = (c.name + ' ' + c.company + ' ' + c.action + ' ' + c.category).toLowerCase();
        if (!searchable.includes(q)) return false;
      }
      if (filterStatus && c.you !== filterStatus && c.spouse !== filterStatus) return false;
      if (filterCategory && c.category !== filterCategory) return false;
      return true;
    });

    filtered.sort((a, b) => {
      let va = a[sortCol] || '', vb = b[sortCol] || '';
      if (sortCol === 'deadline') {
        va = va || '9999'; vb = vb || '9999';
      }
      const cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return sortAsc ? cmp : -cmp;
    });

    const cols = [
      { key: 'name', label: 'Claim' },
      { key: 'deadline', label: 'Deadline' },
      { key: 'you', label: 'You' },
      { key: 'spouse', label: 'Spouse' },
      { key: 'payout', label: 'Payout' },
      { key: 'proof', label: 'Proof' },
      { key: 'action', label: 'Action' },
    ];

    let html = '<div class="claims-toolbar">';
    html += '<input type="text" id="claims-search" placeholder="Search claims..." value="' + filterText.replace(/"/g,'&quot;') + '">';
    html += '<select id="claims-status"><option value="">All statuses</option>';
    statuses.forEach(s => html += '<option value="' + s + '"' + (filterStatus===s?' selected':'') + '>' + s + '</option>');
    html += '</select>';
    html += '<select id="claims-cat"><option value="">All categories</option>';
    categories.forEach(c => html += '<option value="' + c + '"' + (filterCategory===c?' selected':'') + '>' + c + '</option>');
    html += '</select></div>';

    html += '<div class="claims-wrap"><table class="claims-table"><thead><tr>';
    cols.forEach(col => {
      const arrow = sortCol === col.key ? (sortAsc ? '▲' : '▼') : '▴';
      const active = sortCol === col.key ? ' active' : '';
      html += '<th data-col="' + col.key + '">' + col.label + '<span class="sort-arrow' + active + '">' + arrow + '</span></th>';
    });
    html += '</tr></thead><tbody>';

    if (filtered.length === 0) {
      html += '<tr><td colspan="' + cols.length + '" style="text-align:center;color:#888;padding:1.5rem">No matching claims</td></tr>';
    }

    filtered.forEach(c => {
      const dlClass = deadlineClass(c.deadline);
      const nameCell = c.link
        ? '<a href="' + c.link + '" target="_blank" rel="noopener">' + c.name + '</a>'
        : c.name;
      const notesHtml = c.notes ? '<div class="claim-notes">' + c.notes + '</div>' : '';

      html += '<tr>';
      html += '<td>' + nameCell + notesHtml + '</td>';
      html += '<td class="' + dlClass + '">' + fmtDeadline(c.deadline) + '</td>';
      html += '<td class="' + statusClass(c.you) + '">' + (c.you || '—') + '</td>';
      html += '<td class="' + statusClass(c.spouse) + '">' + (c.spouse || '—') + '</td>';
      html += '<td>' + (c.payout || '—') + '</td>';
      html += '<td>' + (c.proof || '—') + '</td>';
      html += '<td><div class="claim-action">' + (c.action || '—') + '</div></td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    el.innerHTML = html;

    // Bind events
    document.getElementById('claims-search').addEventListener('input', function(e) {
      filterText = e.target.value; render();
    });
    document.getElementById('claims-status').addEventListener('change', function(e) {
      filterStatus = e.target.value; render();
    });
    document.getElementById('claims-cat').addEventListener('change', function(e) {
      filterCategory = e.target.value; render();
    });
    el.querySelectorAll('.claims-table th').forEach(th => {
      th.addEventListener('click', function() {
        const col = this.dataset.col;
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        render();
      });
    });
  }

  render();
})();
</script>
</body>
</html>
