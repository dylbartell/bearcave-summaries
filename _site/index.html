document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

function to12h(t) {
  if (/[ap]m/i.test(t)) return t.toUpperCase().replace(/(\d)(AM|PM)/, '$1 $2');
  const p = t.match(/^(\d{1,2}):(\d{2})$/);
  if (p) {
    let h = parseInt(p[1]), mn = p[2];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12;
    else if (h > 12) h -= 12;
    return h + ':' + mn + ' ' + ampm;
  }
  return t;
}

00b7 Retrieved via WebSearch\n\n---\n\n## #1 \u2014 TD Bank $300 Checking + $200 Savings Bonus [Score: 80]\n\n| | |\n|---|---|\n| **Type** | Bank Bonus |\n| **Cash Value** | Up to $500 total ($300 checking + $200 savings) |\n| **Effort** | Medium \u2014 open accounts, make $2,500 in direct deposits within 60 days (checking); $10,000 deposit held 90 days (savings) |\n| **Available** | CT, DC, DE, FL, MD, ME, MA, NC, NH, NJ, NY, PA, RI, SC, VT, VA \u2014 PA eligible: Yes |\n| **Expires** | April 30, 2026 (verify current terms) |\n| **Posted** | Ongoing \u2014 updated March 2026 |\n\nTD Bank is offering up to $500 in bonuses for new customers in PA and other East Coast states: $300 for opening a TD Beyond Checking and meeting direct deposit requirements, plus $200 for opening a savings account with a qualifying deposit. The checking bonus requires $2,500 in direct deposits within 60 days; the savings bonus requires a $10,000 deposit held for 90 days. Soft pull only, no ChexSystems.\n\n> **Verify before acting:** The specific expiration date listed on DoC may have been updated since last scrape \u2014 check the deal page before applying. Accounts must remain open 6 months or the bonus is forfeited.\n\n**Key details:**\n\n- $300 bonus: TD Beyond Checking, $2,500 in direct deposits within 60 days\n- $200 savings bonus: TD Signature or Simple Savings, $10,000 deposit maintained 90 days\n- Must be a new TD Bank customer (no account closed in past 12 months)\n- Available in PA \u2014 TD Bank has physical branches in PA\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/targeted-td-bank-300-checking-200-savings-bonus/)\n\n---\n\n## #2 \u2014 T-Mobile: Free 2026 MLB.TV Season Subscription [Score: 70]\n\n| | |\n|---|---|\n| **Type** | Deal / Freebie |\n| **Cash Value** | ~$150 (MLB.TV full season retail value $149.99) |\n| **Effort** | Easy \u2014 claim via T-Life app, no purchase required |\n| **Available** | Nationwide (T-Mobile customers only) \u2014 PA eligible: Yes |\n| **Expires** | Must claim March 24\u201331, 2026 (limited window) |\n| **Posted** | March 2026 |\n\nT-Mobile is giving away a free 2026 MLB.TV full-season subscription (a $149.99 value) to eligible customers. You must open the T-Life app between March 24\u201331, 2026, find the MLB.TV tile, and redeem. Eligible plans include most T-Mobile, Metro by T-Mobile, Home Internet, and Small Business plans.\n\n> **Verify before acting:** The redemption window doesn't open until March 24 \u2014 add a reminder now. Blackout restrictions apply for local market games.\n\n**Key details:**\n\n- Claim window: March 24, 2026 (5am ET) through March 31, 2026 (4:59am ET)\n- Must claim in T-Life app; can't claim on web\n- Applies to most T-Mobile postpaid plans and Metro by T-Mobile\n- Blackout restrictions apply; account sharing prohibited\n- If you don't have T-Mobile, this doesn't apply \u2014 but MLB.TV alone is worth $149.99\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/t-mobile-free-2026-season-of-mlb-tv-subscription-3-25-3-31/)\n\n---\n\n## #3 \u2014 Chase $900 Checking + Savings Bonus (Targeted) [Score: 70]\n\n| | |\n|---|---|\n| **Type** | Bank Bonus |\n| **Cash Value** | $900 ($300 checking + $200 savings + $400 combined bonus) |\n| **Effort** | Hard \u2014 requires targeted offer + $15,000 savings deposit held 90 days |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | April 15, 2026 |\n| **Posted** | Ongoing \u2014 extended through April 2026 |\n\nChase's $900 checking + savings bundle offer is available to targeted customers and consists of three parts: $300 for opening a Chase Total Checking with a direct deposit, $200 for opening a Chase Savings account with $15,000 deposited within 30 days and maintained for 90 days, plus a $400 bonus for completing both. If you have a targeted mailer or coupon link, this is a strong offer \u2014 but the $15,000 float required for the savings side limits its accessibility.\n\n> **Verify before acting:** This is a targeted offer \u2014 you'll need a specific link or mailer to be eligible. Check DoC's deal page for the most current public-access links and targeting details.\n\n**Key details:**\n\n- $300 checking: Open Chase Total Checking, make one qualifying direct deposit within 90 days\n- $200 savings: Open Chase Savings, deposit $15,000 in new money within 30 days, maintain for 90 days\n- $400 extra bonus: Complete both checking and savings requirements\n- Must not be an existing Chase checking/savings customer (or have closed one in the past 90 days)\n- Offer extended through April 15, 2026\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/targeted-chase-900-checking-savings-bonus/)\n\n---\n\n## #4 \u2014 Office Depot/OfficeMax: $15 Off $300+ Mastercard Gift Cards (Ends 3/21) [Score: 65]\n\n| | |\n|---|---|\n| **Type** | Gift Card Discount |\n| **Cash Value** | ~$6\u2013$15 net profit per $300 transaction (after fees) |\n| **Effort** | Easy \u2014 in-store purchase only |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | March 21, 2026 (this Saturday) |\n| **Posted** | March 15, 2026 |\n\nOffice Depot and OfficeMax stores are running their recurring weekly deal: buy $300 or more in Mastercard gift cards and get $15 off instantly at the register. At current fee rates of $7.95 per $200 card, buying three $200 Mastercards nets roughly $6.15 profit before any card rewards \u2014 and significantly more if you have an Amex Business Gold (for the office supply credit), Chase Ink Cash (5x on office supply), or active Chase/Amex Offers.\n\n**Key details:**\n\n- In-store only (not valid online)\n- Must spend $300+ in Mastercard gift cards in a single transaction for the $15 instant discount\n- Fees: approximately $7.95 per $200 Mastercard gift card\n- Best play: three $200 Mastercards = $600 spend, $15 off, ~$23.85 in fees = ~$6.15 net + card rewards\n- Use Chase Ink Cash or Amex Business Gold at Office Depot for additional category bonuses\n- Check your Chase Offers / Amex Offers for stacking opportunities\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/office-depot-max-stores-buy-300-in-mastercard-giftcards-get-15-instant-discount-2-13-2-19/)\n\n---\n\n## Also Posted (Non-Cash / Informational)\n\n- **New ACH Rules Go Into Effect March 20, 2026** \u2014 NACHA is mandating new \"PAYROLL\" and \"PURCHASE\" company entry descriptions for ACH transfers starting this Thursday; this may affect how banks identify qualifying direct deposits for bonus purposes, though a similar 2014 rule change had minimal real impact on churners. [Link](https://www.doctorofcredit.com/new-ach-rules-go-into-effect-march-20-2026-payroll-description-ai-detection-tools/) \u00b7 *Posted February 25, 2026*\n\n- **Q2 2026 5% Quarterly Categories Overview** \u2014 Chase Freedom/Flex, Discover, Citi Dividend, and U.S. Bank Cash+ Q2 categories are live (April 1\u2013June 30); activate now. Discover earns 5% at restaurants and home improvement stores; Citi Dividend earns 5% at grocery stores. [Link](https://www.doctorofcredit.com/q2-2026-5-quarterly-categories-activate-offers-suggestions-freedom-flex-discover-dividend-cash-more/) \u00b7 *Posted March 2026*\n\n- **IHG Premier/Traveler Increased Welcome Offers Ending** \u2014 Per FrequentMiler, the elevated IHG card welcome offers end tomorrow (March 19). [Link](https://frequentmiler.com/) \u00b7 *Posted March 17, 2026*\n\n---\n\n## Notes\n\nToday is a moderately active day dominated by bank bonuses. The TD Bank PA-eligible $500 offer is the standout for Dylan given confirmed eligibility. The Office Depot Mastercard deal is ending Saturday \u2014 worth a quick in-store trip if you have a card earning 5x at office supply stores.\n\n*Retrieval method: WebSearch (doctorofcredit.com blocked at network level). Always verify offer status at the linked URL before acting.*\n"}, {"filename": "DoC-Digest-2026-03-17.md", "content": "# DoC Daily Digest \u2014 March 17, 2026\ ou have idle cash to park. The bonus arrives roughly 105 days after opening (60-day hold + 45-day payout window).\n\n> **Verify before acting:** You need to fund the account by 11:59 PM ET on March 31, 2026, then maintain $20,000+ for 60 consecutive days. The actual bonus won't land until mid-summer.\n\n**Key details:**\n\n- Open and fund a personal savings account with $20,000+ by March 31, 2026\n- Maintain $20,000+ balance for 60 consecutive days from when that threshold is first reached\n- Bonus deposited within 45 days after the 60-day period ends\n- One bonus per Tax ID number; only personal savings accounts qualify\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/243542-2/)\n\n---\n\n## #3 \u2014 Q2 2026 5% Category Cards: Activate Now [Score: 70]\n\n| | |\n|---|---|\n| **Type** | Credit Card (Activation Reminder) |\n| **Cash Value** | $75\u2013$300+ estimated (depends on cards held and spend) |\n| **Effort** | Easy \u2014 one-click activation per card |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | Activate before April 1, 2026; quarter runs April 1\u2013June 30 |\n| **Posted** | March 15, 2026 |\n\nQ2 2026 activation is now live for all major 5% rotating category cards. If you hold a Chase Freedom, Chase Freedom Flex, Discover it, or Citi Dividend, you must activate before April 1 or you'll earn just 1% on otherwise-qualifying purchases all quarter. Takes 30 seconds per card.\n\n**Key details:**\n\n- Chase Freedom / Freedom Flex: 5% on Amazon, Chase Travel, and Feeding America (up to $1,500 = up to $75 back)\n- Discover it: 5% on Restaurants and Home Improvement Stores (up to $1,500 = up to $75 back)\n- Citi Dividend: 5% on Grocery Stores and Citi Travel (unusual $6,000 *annual* cap \u2014 much more flexible)\n- US Bank Cash+: Choose 2 categories for 5% on up to $2,000/quarter\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/q2-2026-5-quarterly-categories-activate-offers-suggestions-freedom-flex-discover-dividend-cash-more/)\n\n---\n\n## Also Posted (Non-Cash / Informational)\n\n- **Paramount+: Free Month** \u2014 Promo code bg2l7m works for new and returning customers. [Link](https://www.doctorofcredit.com/free-month-of-cbs-all-access-with-promo-code-giving-works-for-new-existing-previous-users/) \u00b7 *Posted March 16*\n\n- **Paramount+: 2 Months for $2.99/Month** \u2014 Discounted rate for new and returning customers through March 31. [Link](https://www.doctorofcredit.com/paramount-two-months-for-2-99-per-month-new-returning-customers/) \u00b7 *Posted March 16*\n\n- **[YMMV] PayPal Rewards: 1,500\u20132,000 Points for $40-$50 Purchases** \u2014 Targeted; check your PayPal app for the offer before spending. [Link](https://www.doctorofcredit.com/ymmv-paypal-rewards-make-2-3-purchases-of-40-50-earn-1500-2000-points/) \u00b7 *Posted March 16*\n\n- **[YMMV] Best Buy: $5/$10 Rewards Certificate** \u2014 Targeted to select My Best Buy members; check your account inbox. [Link](https://www.doctorofcredit.com/ymmv-best-buy-10-rewards-certificate-2/) \u00b7 *Posted March 16*\n\n- **Meijer: Buy $50 Gift Cards, Get 5,000 Points (50k cap)** \u2014 Meijer-only deal; not applicable in PA. [Link](https://www.doctorofcredit.com/meijer-purchase-50-in-third-party-giftcards-get-5000-points/) \u00b7 *Posted March 17*\n\n- **Kroger / Harris Teeter: 4x Fuel Points on Visa/MC Gift Cards** \u2014 Midwest/Southeast focused; limited PA applicability. \u00b7 *Posted March 17*\n\n- **Capital One Caf\u00e9: Free Drink for NCAA Bracket** \u2014 Fill out a March Madness bracket at any Capital One Caf\u00e9 location for a complimentary drink. [Link](https://www.doctorofcredit.com/capital-one-cafes-free-drink-for-filling-out-ncaa-march-madness-bracket/) \u00b7 *Posted March 16*\n\n- **Wyndham 2026 Award Changes (Effective April 15)** \u2014 88% of properties unchanged, 8% decreasing, 4% increasing. Net positive for most. [Link](https://www.doctorofcredit.com/wyndham-2026-award-changes-88-remain-same tegory Activations (Chase, Discover, Citi, US Bank) [Score: 65]\n\n| | |\n|---|---|\n| **Type** | Cashback Activation |\n| **Cash Value** | $75/card/quarter; $300+ if you hold multiple cards |\n| **Effort** | Easy \u2014 activate online in 2 minutes per card |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | Activate before June 30, 2026 (categories start April 1) |\n| **Posted** | March 15, 2026 |\n\nQ2 2026 categories are live for activation. Chase Freedom/Flex: Amazon, Chase Travel, Feeding America (5% up to $1,500). Discover IT: Restaurants & Home Improvement (5% up to $1,500). Citi Dividend: Grocery Stores & Citi Travel (5%, $6,000 annual cap). US Bank Cash+: pick your two preferred categories. Free money if you hold any of these cards \u2014 takes 2 minutes per card.\n\n**Key details:**\n\n- Chase Freedom/Flex: activate at chase.com \u2014 Amazon and Chase Travel are both strong Q2 earners\n- Discover IT: restaurants 5% is great for dining spend April\u2013June\n- Citi Dividend: grocery stores covers most everyday spending\n- US Bank Cash+: select TV/Internet/Streaming + one other for max value\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/q2-2026-5-quarterly-categories-activate-offers-suggestions-freedom-flex-discover-dividend-cash-more/)\n\n---\n\n## #4 \u2014 HSBC Premier Checking $1,500\u2013$7,000 Bonus [Score: 75]\n\n| | |\n|---|---|\n| **Type** | Bank Bonus |\n| **Cash Value** | $1,500\u2013$7,000 depending on deposit tier |\n| **Effort** | Hard \u2014 requires $150,000\u2013$1,000,000+ in new assets |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | March 31, 2026 |\n| **Posted** | Active offer (updated March 2026) |\n\nHSBC is offering a large tiered checking bonus for new Premier customers who move significant assets: $1,500 for $150K\u2013$249K, $2,500 for $250K\u2013$499K, up to $7,000 for $1M+. New assets must be added by March 31 and maintained through June 30, 2026. The $50/month fee u00b7 *Posted recently*\n- **Sunday Roundup: AmEx Marriott 200K Bonvoy Brilliant bonus + Marriott free night cert top-up updates** \u2014 Elevated offer if you're in the market for a Marriott card. [Link](https://www.doctorofcredit.com/best-posts-last-week-200k-marriott-new-restrictive-language-more/) \u00b7 *Posted March 16*\n\n---\n\n## Notes\n\nModerate day \u2014 two actionable bank bonuses (Truist expiring 3/25, HSBC expiring 3/31) and the Office Depot gift card deal active right now through 3/21. The Q2 5% category activation is the easiest win if you already hold Chase, Discover, Citi, or US Bank cards. Direct navigation to doctorofcredit.com may be blocked; offer links were retrieved via search.\n\n*Retrieval method: WebSearch (doctorofcredit.com blocked at network level). Always verify offer status at the linked URL before acting.*\n"}, {"filename": "DoC-Digest-2026-03-15.md", "content": "# DoC Daily Digest \u2014 March 15, 2026\n\n**~15 posts scanned** \u00b7 **4 cash-value offers found** \u00b7 Retrieved via WebSearch\n\n---\n\n## #1 \u2014 Huntington Bank $400\u2013$600 Checking Bonus [Score: 80]\n\n| | |\n|---|---|\n| **Type** | Bank Bonus |\n| **Cash Value** | $400 (Perks Checking) or $600 (Platinum Perks, requires $25K deposit) |\n| **Effort** | Medium \u2014 open account, receive $500+ direct deposit within 90 days, keep open 90 days |\n| **Available** | PA, OH, MI, IN, KY, WV, IL, CO, MN, SC, WI, NC, TX \u2014 PA eligible: Yes |\n| **Expires** | **March 15, 2026 (TODAY)** |\n| **Posted** | March 13\u201314, 2026 |\n\nHuntington is offering a $400 bonus on their Perks Checking account (or $600 on Platinum Perks with a $25K new money deposit). PA is explicitly listed as an eligible state. The $400 tier is the sweet spot \u2014 no large balance requirement, just a $500/month direct deposit.\n\n> **Verify before acting:** This offer expires today (3/15/26). Confirm availability and apply immediately if interested. The $600 offer requires $25,000 in new deposits within 90 days \u2014 only pursue if you have liquid funds available.\n\n**Key details:**\n\n- Open a new Huntington Perks Checking account with a promotion code by end of today, March 15, 2026.\n- Receive at least $500 in qualifying direct deposits (payroll, Social Security, etc.) within 90 days of opening.\n- Bonus deposited within 14 days of meeting requirements; account must stay open 90 days.\n- Platinum Perks ($600) requires $25,000 in new money deposits within 90 days.\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/oh-mi-pa-ky-wv-huntington-bank-200-checking-promotion-no-direct-deposit-requirement/)\n\n---\n\n## #2 \u2014 AmEx Offer: YouTube TV $20 Back (Up to 3x = $60) [Score: 75]\n\n| | |\n|---|---|\n| **Type** | Cashback / AmEx Offer |\n| **Cash Value** | $20 per use, repeatable up to 3 times ($60 total) |\n| **Effort** | Easy \u2014 add offer to your AmEx card, spend $49.99 on YouTube TV |\n| **Available** | Nationwide (targeted AmEx cardholders) \u2014 PA eligible: Yes |\n| **Expires** | March 20, 2026 |\n| **Posted** | ~March 13\u201314, 2026 |\n\nSpend $49.99 on YouTube TV and get $20 back as a statement credit \u2014 this can be done three times for up to $60 total back. Great for anyone who already uses or is willing to try YouTube TV. If you don't currently subscribe, a one-month trial + cancellation makes this essentially a $20 profit.\n\n> **Verify before acting:** This is a targeted offer \u2014 check your AmEx card's offers section to confirm it's available to you before planning around it.\n\n**Key details:**\n\n- Must add the offer to your eligible AmEx card first (check the AmEx app or online portal).\n- Spend must be $49.99+ at YouTube TV per transaction; up to 3 uses.\n- Statement credit posts within a few days of qualifying purchase.\n- Expires March 20, 2026 \u2014 five days remaining.\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/)\n\n---\n\n## #3 \u2014 Q2 2026 5% Quarterly Categories \u2014 Activate Now [Score: 70]\n\n| | |\n|---|---|\n| **Type** | Credit Card Cashback (activation required) |\n| **Cash Value** | Up to $75/card on $1,500 spend; multiple cards = $150\u2013$225+ potential |\n| **Effort** | Easy \u2014 activate each card online or via app before April 1 |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | Activation window open now; Q2 runs April 1 \u2013 June 30, 2026 |\n| **Posted** | ~March 14, 2026 |\n\nQ2 2026 starts April 1 \u2014 now is the time to activate 5% category bonuses on Chase Freedom/Flex, Discover IT, Citi Dividend, and US Bank Cash+. Chase Freedom/Flex earns 5% on Amazon, Chase Travel, and Feeding America (up to $1,500 combined). Discover earns 5% on Restaurants and Home Improvement Stores. Don't leave free money on the table by forgetting to activate.\n\n**Key details:**\n\n- **Chase Freedom / Freedom Flex**: 5% on Amazon, Chase Travel & Feeding America (up to $1,500 spend cap = $75 max per card).\n- **Discover IT**: 5% on Restaurants and Home Improvement Stores (up to $1,500 = $75 max).\n- **Citi Dividend**: 5% on Grocery Stores & Citi Travel (annual cap of $6,000 rather than quarterly $1,500).\n- Activation is required for each card separately \u2014 it does not carry over automatically.\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/q2-2026-5-quarterly-categories-activate-offers-suggestions-freedom-flex-discover-dividend-cash-more/)\n\n---\n\n## #4 \u2014 Amazon $20 Off $200 in Gift Cards [Score: 55]\n\n| | |\n|---|---|\n| **Type** | Gift Card Discount |\n| **Cash Value** | $20 (10% effective discount on participating brands) |\n| **Effort** | Easy \u2014 buy eligible gift cards on Amazon |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | Limited-time (posted March 14, 2026 \u2014 verify current status) |\n| **Posted** | March 14, 2026 |\n\nAmazon is offering $20 off when you buy $200 in gift cards from a selection of brands including Netflix, Ulta, Chipotle, Airbnb, Nordstrom, Darden, Southwest, and StubHub. Best played by buying gift cards for places you already shop to lock in a guaranteed 10% discount.\n\n> **Verify before acting:** Gift card deal availability and eligible brands can change quickly \u2014 confirm the offer is still live before purchasing.\n\n**Key details:**\n\n- Buy $200+ in qualifying gift cards from the listed brands in one purchase.\n- $20 discount applied at checkout.\n- Best for brands you'll realistically use (avoid buying gift cards just for the discount).\n- Stacks well with cashback portals or credit card category bonuses if applicable.\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/)\n\n---\n\n## Also Posted (Non-Cash / Informational)\n\n- **New ACH Rules Go Into Effect March 20, 2026** \u2014 NACHA implementing new Fraud Monitoring rules and standardized \"PAYROLL\"/\"PURCHASE\" company entry descriptions; relevant if you rely on bank account bonus direct deposit workarounds. [Link](https://www.doctorofcredit.com/new-ach-rules-go-into-effect-march-20-2026-payroll-description-ai-detection-tools/) \u00b7 *Posted this week*\n\n- **HSBC $1,500\u2013$7,000 Checking Bonus** \u2014 Very high value but requires large deposit/investment ($10K\u2013$100K+); Hard effort, PA eligibility unknown. Ongoing through June 30, 2026. [Link](https://www.doctorofcredit.com/hsbc-1500-7000-checking-bonus/) \u00b7 *Ongoing*\n\n- **Central Bank $300\u2013$800 Checking Bonus (Promo Code: STEP)** \u2014 Increased to $300 minimum; expires April 30, 2026; PA eligibility unconfirmed, worth checking. [Link](https://www.doctorofcredit.com/best-bank-account-bonuses/) \u00b7 *Updated March 14, 2026*\n\n- **Martin's Food: 2x Fuel Points on Mastercard Gift Cards** \u2014 Earn double fuel points on Mastercard GCs through March 19 at Martin's (PA-present chain). Low direct cash value but stackable. [Link](https://www.doctorofcredit.com/) \u00b7 *Expires 3/19*\n\n- **Marriott Amex Best-Ever Welcome Offers: 175K\u2013200K Points** \u2014 Bonvoy Bevy (175K/$5K spend/6mo) and Bonvoy Brilliant (200K/$6K spend/6mo); travel-focused, not direct cash. [Link](https://frequentmiler.com/marriott-amex-cards-best-ever-welcome-offers/) \u00b7 *Posted this week*\n\n---\n\n## Notes\n\nToday is a moderately active day dominated by the Huntington Bank bonus expiring at midnight \u2014 that is the single most time-sensitive item and should be acted on immediately if eligible. The Q2 5% category activation is a no-effort, high-return reminder that's easy to miss. Coverage from FrequentMiler and DoC is broadly consistent today.\n\n*Retrieval method: WebSearch (doctorofcredit.com blocked at network level). Always verify offer status at the linked URL before acting.*\n"}, {"filename": "DoC-Digest-2026-03-14.md", "content": "# DoC Daily Digest \u2014 March 14, 2026\n\n**~6 posts scanned** \u00b7 **2 cash-value offers found** \u00b7 Retrieved via WebSearch\n\n---\n\n## #1 \u2014 T-Mobile: Free 2026 MLB.TV Season Subscription [Score: 70]\n\n| | |\n|---|---|\n| **Type** | Free Subscription / Deal |\n| **Cash Value** | ~$150 (MLB.TV full season retail ~$149.99) |\n| **Effort** | Easy \u2014 redeem through the T-Life app |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | Redemption window: 3/25/2026\u20133/31/2026 |\n| **Posted** | ~March 13\u201314, 2026 |\n\nT-Mobile is offering a free full 2026 MLB season subscription via the T-Life app. If you're a T-Mobile customer and a baseball fan (or know one), this is an easy $150 free. The redemption window opens March 25, so mark your calendar now.\n\n**Key details:**\n\n- Must be a T-Mobile subscriber to claim\n- Redeem through the T-Life app between 3/25/2026 and 3/31/2026\n- Full season access to all out-of-market MLB games; local blackout restrictions apply\n- No additional purchase required\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/t-mobile-free-2026-season-of-mlb-tv-subscription-3-25-3-31/)\n\n---\n\n## #2 \u2014 7  2026*\n\n---\n\n## Notes\n\nLight day for PA-actionable cash offers \u2014 the big bank bonuses (Truist $400, TD Bank up to $500 checking+savings) are ongoing and worth checking if you haven't done them yet. The T-Mobile MLB.TV deal is the standout for the week; set a reminder for 3/25 to claim it. ACH rule changes on 3/20 are mostly background news unless you're monitoring direct deposit triggers for bank bonuses.\n\n*Retrieval method: WebSearch (doctorofcredit.com blocked at network level). Always verify offer status at the linked URL before acting.*\n"}, {"filename": "DoC-Digest-2026-03-13.md", "content": "# DoC Daily Digest \u2014 March 13, 2026\n\n**~5 posts scanned** \u00b7 **1 cash-value offer found** \u00b7 Retrieved via WebSearch\n\n---\n\n## #1 \u2014 Amazon: Save 15% On Gift Cards (Uber, Hotels.com, PetSmart) [Score: 60]\n\n| | |\n|---|---|\n| **Type** | Gift Card Discount (Cash Equivalent) |\n| **Cash Value** | ~$15\u2013$45 depending on how many you buy |\n| **Effort** | Easy \u2014 online, no special membership required |\n| **Available** | Nationwide \u2014 PA eligible: Yes |\n| **Expires** | Not specified (sell out quickly \u2014 limited quantities) |\n| **Posted** | Originally March 9; article still active on DoC as of today |\n\nAmazon is selling select gift cards at 15%\u201330% off, including Uber, Hotels.com, PetSmart, inKind, Krispy Kreme, and Panera Bread. Each card has a per-household purchase limit, so total savings per person is ~$15\u2013$45. Uber and Hotels.com have cash-equivalent value; PetSmart is cash-like if you shop there. These deals sell out fast.\n\n> **Verify before acting:** FrequentMiler has this marked as (EXPIRED), while DoC's article title does not show [Expired]. Check the DoC link directly to confirm cards are still available before buying.\n\n**Key details:**\n\n- No special membership required (no Prime needed for most)\n- Uber $100 gift card: $85 (15% off) \u2014 limit 1 per household\n- Hotels.com $50 gift card: $42.50 (15% off) \u2014 limit 2 per household\n- PetSmart $50 gift card: $42.50 (15% off) \u2014 limit varies\n- Some are eGift cards (immediate delivery), some are physical\n\n[View on Doctor of Credit](https://www.doctorofcredit.com/amazon-save-15-on-giftcards-uber-hotels-com-petsmart-and-more/)\n\n---\n\n## Also Posted (Non-Cash / Informational)\n\n- **X Money \u2014 3% Cashback Exclusion List Revealed** \u2014 Taxes, money orders, wire transfers, financial institutions, FX, precious metals excluded. X Money not publicly available yet; informational only. [Link](https://www.doctorofcredit.com/x-money-3-cashback-exclusion-list-taxes-money-orders-more/) \u00b7 *Posted ~15 hours ago*\n\n- **Marriott Free Night Certificates \u2014 Top Off With Up To 25,000 Points** \u2014 Up from 15,000. Useful for Bonvoy cardholders; points-based, not cash. [Link](https://www.doctorofcredit.com/marriott-free-night-certificates-can-now-be-topped-off-with-up-to-25000-points/) \u00b7 *Posted ~1 day ago*\n\n- **[Expired] Citi ThankYou 15% Gift Card Redemption Discount** \u2014 Was active March 9 only. Now expired. [Link](https://www.doctorofcredit.com/today-only-3-9-citi-thankyou-15-gift-card-redemption-discount-apple-instacart-google-choice-more/)\n\n---\n\n## Notes\n\nToday was a light day on DoC. The only confirmed cash-value post from the last 24 hours is the X Money informational piece. The Amazon gift card deal is still listed as active on DoC but was originally posted March 9 \u2014 confirm availability at the link before acting. No new bank bonuses, checking bonuses, or credit card welcome offers were posted in the last 24 hours.\n\n*Retrieval method: WebSearch (doctorofcredit.com blocked at network level). Always verify offer status at the linked URL before acting.*\n"}];

(function() {
  const el = document.getElementById("summaries");
  const entries = data_summaries;
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty">No entries yet.</div>';
  } else {
    entries.forEach(e => {
      const div = document.createElement("div");
      div.className = "summary";
      div.innerHTML = marked.parse(e.content);

      // Try to normalize any h1 or h2 into the styled header block
      const heading = div.querySelector('h1') || div.querySelector('h2');
      let parsed = false;
      if (heading) {
        const text = heading.textContent.trim();

        // Pattern 1: channel + Monitor/summary/alert + date + time
        let m = text.match(/^#?\s*([\w-]+)\s+(?:monitor|summary|alert)\s*[—–-]\s*(\d{4}-\d{2}-\d{2})\s+(.+)$/i);
        if (m) {
          const dateStr = m[2];
          let rawTime = m[3].replace(/^~/, '').replace(/\s+local$/i, '').split(/[—–-]/)[0].trim();
          const timeDisplay = to12h(rawTime);
          const [y, mo, d] = dateStr.split('-');
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const formatted = months[parseInt(mo)-1] + ' ' + parseInt(d) + ', ' + y + ' · ' + timeDisplay + ' EST';
          const hdr = document.createElement('div');
          hdr.className = 'header';
          hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + formatted + '</div>';
          heading.replaceWith(hdr);
          parsed = true;
        }

        // Pattern 2: "BEARCAVE ALERT — H:MM AM (Month DD, YYYY)"
        if (!parsed) {
          m = text.match(/alert\s*[—–-]\s*(\d{1,2}:\d{2}\s*[APap][Mm])\s*\((.+)\)/i);
          if (m) {
            const timeDisplay = to12h(m[1]);
            const hdr = document.createElement('div');
            hdr.className = 'header';
            hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + m[2].trim() + ' · ' + timeDisplay + ' EST</div>';
            heading.replaceWith(hdr);
            parsed = true;
          }
        }

        // Fallback: if heading looks bearcave-related but didn't parse, use filename
        if (!parsed && /bearcave/i.test(text)) {
          heading.remove();
        }
      }

      // If no heading was parsed, try to build header from filename (YYYY-MM-DD_HH-MM.md)
      if (!parsed) {
        const fm = e.filename.match(/^(\d{4})-(\d{2})-(\d{2})_(\d{2})-(\d{2})/);
        if (fm) {
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const timeDisplay = to12h(fm[4] + ':' + fm[5]);
          const formatted = months[parseInt(fm[2])-1] + ' ' + parseInt(fm[3]) + ', ' + fm[1] + ' · ' + timeDisplay + ' EST';
          const hdr = document.createElement('div');
          hdr.className = 'header';
          hdr.innerHTML = '<div class="channel">BEARCAVE-CHAT</div><div class="datetime">' + formatted + '</div>';
          div.insertBefore(hdr, div.firstChild);
        }
      }

      // Strip leading paragraphs that duplicate header info (channel name, date/time lines)
      const firstChildren = Array.from(div.children);
      for (const child of firstChildren) {
        if (child.classList && child.classList.contains('header')) continue;
        if (child.tagName === 'P') {
          const t = child.textContent.trim();

(function() {
  const el = document.getElementById("doc-digest");
  const entries = data_doc_digest;
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty">No entries yet.</div>';
  } else {
    entries.forEach(e => {
      const div = document.createElement("div");
      div.className = "doc-digest";
      div.innerHTML = marked.parse(e.content);

      // Transform the h1 into a styled digest header
      const h1 = div.querySelector('h1');
      if (h1) {
        const text = h1.textContent.trim();
        // Extract date from "DoC Daily Digest — March 13, 2026"
        const m = text.match(/digest\s*[—–-]\s*(.+)$/i);
        const hdr = document.createElement('div');
        hdr.className = 'doc-header';
        hdr.innerHTML = '<div class="doc-channel">DOCTOR OF CREDIT</div>'
          + '<div class="doc-date">' + (m ? m[1].trim() : text) + '</div>';
        // Pull out the subtitle line (posts scanned / offers found)
        const nextEl = h1.nextElementSibling;
        if (nextEl && nextEl.tagName === 'P' && /posts scanned/i.test(nextEl.textContent)) {
          hdr.innerHTML += '<div class="doc-meta">' + nextEl.innerHTML + '</div>';
          nextEl.remove();
        }
        h1.replaceWith(hdr);
      }

      // Remove leading <hr> right after header
      const firstHr = div.querySelector('.doc-header + hr');
      if (firstHr) firstHr.remove();

      // Style each deal section (## #N — Title [Score: N])
      div.querySelectorAll('h2').forEach(h2 => {
        const t = h2.textContent.trim();
        const dealMatch = t.match(/^#(\d+)\s*[—–-]\s*(.+?)\s*\[Score:\s*(\d+)\]/i);
        if (dealMatch) {
          const num = dealMatch[1];
          const title = dealMatch[2].trim();
          const score = dealMatch[3];
          const badge = document.createElement('div');
          badge.className = 'doc-deal-header';
          let scoreClass = 'score-low';
          if (parseInt(score) >= 60) scoreClass = 'score-high';
          else if (parseInt(score) >= 35) scoreClass = 'score-mid';
          badge.innerHTML = '<span class="doc-deal-num">#' + num + '</span>'
            + '<span class="doc-deal-title">' + title + '</span>'
            + '<span class="doc-deal-score ' + scoreClass + '">' + score + '</span>';
          h2.replaceWith(badge);
        }
        // "Also Posted" section header
        const alsoMatch = t.match(/also posted/i);
        if (alsoMatch) {
          h2.className = 'doc-section-divider';
        }
        // "Notes" section
        if (/^notes$/i.test(t)) {
          h2.className = 'doc-section-divider doc-notes-header';
        }
      });

      // Style metadata tables (the 2-col key/value tables)
      div.querySelectorAll('table').forEach(table => {
        const rows = table.querySelectorAll('tr');
        const cols = rows.length > 0 ? rows[0].querySelectorAll('td, th') : [];
        if (cols.length === 2) {
          table.className = 'doc-meta-table';
        }
      });

      // Style blockquotes as warning callouts
      div.querySelectorAll('blockquote').forEach(bq => {
        bq.className = 'doc-warning';
      });

      // Style "View on Doctor of Credit" links
      div.querySelectorAll('a').forEach(a => {
        if (/view on doctor of credit/i.test(a.textContent) || /full details/i.test(a.textContent)) {
          const wrapper = document.createElement('div');
          wrapper.className = 'doc-cta';
          const btn = a.cloneNode(true);
          btn.className = 'doc-cta-link';
          wrapper.appendChild(btn);
          if (a.parentElement && a.parentElement.tagName === 'P') {
            a.parentElement.replaceWith(wrapper);
          } else {
            a.replaceWith(wrapper);
          }
        }
      });

      el.appendChild(div);
    });
  }
})();

  if (claims.length === 0) { el.innerHTML = '<div class="empty">No claims found.</div>'; return; }

  const today = new Date();
  today.setHours(0,0,0,0);

  function daysUntil(d) {
    if (!d) return 9999;
    const dt = new Date(d + 'T00:00:00');
    return Math.ceil((dt - today) / 86400000);
  }

  function deadlineClass(d) {
    const days = daysUntil(d);
    if (days <= 14) return 'deadline-urgent';
    if (days <= 30) return 'deadline-soon';
    return '';
  }

  function statusClass(s) {
    if (!s) return '';
    const low = s.toLowerCase();
    if (low === 'new') return 'status-new';
    if (low === 'filed' || low === 'completed') return 'status-filed';
    if (low.includes('review')) return 'status-review';
    return '';
  }

  function fmtDeadline(d) {
    if (!d) return '—';
    const dt = new Date(d + 'T00:00:00');
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = daysUntil(d);
    let label = mo[dt.getMonth()] + ' ' + dt.getDate();
    if (days <= 30 && days >= 0) label += ' (' + days + 'd)';
    return label;
  }

  // State
  let sortCol = 'deadline';
  let sortAsc = true;
  let filterText = '';
  let filterStatus = '';
  let filterCategory = '';

  // Get unique categories and statuses
  const categories = [...new Set(claims.map(c => c.category).filter(Boolean))].sort();
  const statuses = [...new Set(claims.flatMap(c => [c.you, c.spouse]).filter(Boolean))].sort();

  function render() {
    let filtered = claims.filter(c => {
      if (filterText) {
        const q = filterText.toLowerCase();
        const searchable = (c.name + ' ' + c.company + ' ' + c.action + ' ' + c.category).toLowerCase();
        if (!searchable.includes(q)) return false;
      }
      if (filterStatus && c.you !== filterStatus && c.spouse !== filterStatus) return false;
      if (filterCategory && c.category !== filterCategory) return false;
      return true;
    });

    filtered.sort((a, b) => {
      let va = a[sortCol] || '', vb = b[sortCol] || '';
      if (sortCol === 'deadline') {
        va = va || '9999'; vb = vb || '9999';
      }
      const cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return sortAsc ? cmp : -cmp;
    });

    const cols = [
      { key: 'name', label: 'Claim' },
      { key: 'deadline', label: 'Deadline' },
      { key: 'you', label: 'You' },
      { key: 'spouse', label: 'Spouse' },
      { key: 'payout', label: 'Payout' },
      { key: 'proof', label: 'Proof' },
      { key: 'action', label: 'Action' },
    ];

    let html = '<div class="claims-toolbar">';
    html += '<input type="text" id="claims-search" placeholder="Search claims..." value="' + filterText.replace(/"/g,'&quot;') + '">';
    html += '<select id="claims-status"><option value="">All statuses</option>';
    statuses.forEach(s => html += '<option value="' + s + '"' + (filterStatus===s?' selected':'') + '>' + s + '</option>');
    html += '</select>';
    html += '<select id="claims-cat"><option value="">All categories</option>';
    categories.forEach(c => html += '<option value="' + c + '"' + (filterCategory===c?' selected':'') + '>' + c + '</option>');
    html += '</select></div>';

    html += '<div class="claims-wrap"><table class="claims-table"><thead><tr>';
    cols.forEach(col => {
      const arrow = sortCol === col.key ? (sortAsc ? '▲' : '▼') : '▴';
      const active = sortCol === col.key ? ' active' : '';
      html += '<th data-col="' + col.key + '">' + col.label + '<span class="sort-arrow' + active + '">' + arrow + '</span></th>';
    });
    html += '</tr></thead><tbody>';

    if (filtered.length === 0) {
      html += '<tr><td colspan="' + cols.length + '" style="text-align:center;color:#888;padding:1.5rem">No matching claims</td></tr>';
    }

    filtered.forEach(c => {
      const dlClass = deadlineClass(c.deadline);
      const nameCell = c.link
        ? '<a href="' + c.link + '" target="_blank" rel="noopener">' + c.name + '</a>'
        : c.name;
      const notesHtml = c.notes ? '<div class="claim-notes">' + c.notes + '</div>' : '';

      html += '<tr>';
      html += '<td>' + nameCell + notesHtml + '</td>';
      html += '<td class="' + dlClass + '">' + fmtDeadline(c.deadline) + '</td>';
      html += '<td class="' + statusClass(c.you) + '">' + (c.you || '—') + '</td>';
      html += '<td class="' + statusClass(c.spouse) + '">' + (c.spouse || '—') + '</td>';
      html += '<td>' + (c.payout || '—') + '</td>';
      html += '<td>' + (c.proof || '—') + '</td>';
      html += '<td><div class="claim-action">' + (c.action || '—') + '</div></td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    el.innerHTML = html;

    // Bind events
    document.getElementById('claims-search').addEventListener('input', function(e) {
      filterText = e.target.value; render();
    });
    document.getElementById('claims-status').addEventListener('change', function(e) {
      filterStatus = e.target.value; render();
    });
    document.getElementById('claims-cat').addEventListener('change', function(e) {
      filterCategory = e.target.value; render();
    });
    el.querySelectorAll('.claims-table th').forEach(th => {
      th.addEventListener('click', function() {
        const col = this.dataset.col;
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        render();
      });
    });
  }

  render();
})();
</script>
